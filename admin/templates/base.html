<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
          integrity="sha512-WWG/QztPBvezaRo3WuRRhsIuvpBPq0jqrQhuD6neZjle2/Fwj/spneB5NxBptNJDdYU/+u2bztZlDpz0JCHyBQ=="
          crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f8f9fc;
      --bg-surface: #ffffff;
      --bg-card: #ffffff;
      --bg-hover: #f1f3f9;
      --border: #e2e5ef;
      --border-hover: #c8cddb;
      --text: #1a1c2e;
      --text-dim: #5c6078;
      --text-muted: #9498ac;
      --accent: #7c3aed;
      --accent-dim: rgba(124, 58, 237, 0.08);
      --green: #059669;
      --green-dim: rgba(5, 150, 105, 0.1);
      --amber: #d97706;
      --amber-dim: rgba(217, 119, 6, 0.1);
      --red: #dc2626;
      --red-dim: rgba(220, 38, 38, 0.1);
      --blue: #2563eb;
      --blue-dim: rgba(37, 99, 235, 0.1);
      --pink: #db2777;
      --pink-dim: rgba(219, 39, 119, 0.1);
      --radius: 10px;
      --font: "Inter", system-ui, -apple-system, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace;
    }

    [data-theme="dark"] {
      --bg: #0f1117;
      --bg-surface: #161822;
      --bg-card: #1a1d2e;
      --bg-hover: #202336;
      --border: #252840;
      --border-hover: #333758;
      --text: #e4e5ed;
      --text-dim: #9395ab;
      --text-muted: #5c5f77;
      --accent: #a78bfa;
      --accent-dim: rgba(167, 139, 250, 0.1);
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.1);
      --amber: #fbbf24;
      --amber-dim: rgba(251, 191, 36, 0.1);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.1);
      --blue: #60a5fa;
      --blue-dim: rgba(96, 165, 250, 0.1);
      --pink: #f472b6;
      --pink-dim: rgba(244, 114, 182, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ── Layout ──────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────────── */
    .sidebar {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px 16px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .brand-sub {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 450;
      color: var(--text-dim);
      transition: all 0.15s ease;
    }
    .nav-link:hover { color: var(--text); background: var(--bg-hover); }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.55; }
    .nav-link:hover svg { opacity: 0.85; }
    .nav-link-active { color: var(--accent); background: var(--accent-dim); }
    .nav-link-active svg { opacity: 1; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-dim);
      font-size: 12px;
      font-family: var(--mono);
      cursor: pointer;
      width: 100%;
      transition: all 0.15s ease;
      margin-bottom: 8px;
    }
    .theme-toggle:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }
    .theme-toggle svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.55; }
    .theme-toggle:hover svg { opacity: 0.85; }
    .theme-toggle .icon-light { display: inline; }
    .theme-toggle .icon-dark { display: none; }
    [data-theme="dark"] .theme-toggle .icon-light { display: none; }
    [data-theme="dark"] .theme-toggle .icon-dark { display: inline; }
    .sidebar-footer-row {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Content ────────────────────────────────────── */
    .content {
      padding: 32px 36px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .page-header { animation: fadeIn 0.4s ease; }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .page-header p {
      font-size: 13px;
      color: var(--text-dim);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .meta-item {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
    }
    .pill {
      font-size: 11px;
      font-family: var(--mono);
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--bg-hover);
    }

    /* ── Cards ──────────────────────────────────────── */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      transition: border-color 0.2s ease;
      animation: fadeIn 0.4s ease both;
    }
    .card:hover { border-color: var(--border-hover); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 10px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .card-value {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--text-dim);
    }

    .card-accent-purple { border-top: 2px solid var(--accent); }
    .card-accent-green  { border-top: 2px solid var(--green); }
    .card-accent-amber  { border-top: 2px solid var(--amber); }
    .card-accent-red    { border-top: 2px solid var(--red); }
    .card-accent-blue   { border-top: 2px solid var(--blue); }
    .card-accent-pink   { border-top: 2px solid var(--pink); }

    /* ── Tags ───────────────────────────────────────── */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 500;
      border: 1px solid;
    }
    .tag-green  { color: var(--green);  border-color: var(--green-dim);  background: var(--green-dim); }
    .tag-amber  { color: var(--amber);  border-color: var(--amber-dim);  background: var(--amber-dim); }
    .tag-red    { color: var(--red);    border-color: var(--red-dim);    background: var(--red-dim); }
    .tag-blue   { color: var(--blue);   border-color: var(--blue-dim);   background: var(--blue-dim); }
    .tag-pink   { color: var(--pink);   border-color: var(--pink-dim);   background: var(--pink-dim); }
    .tag-dim    { color: var(--text-dim); border-color: var(--border); background: var(--bg-hover); }

    .tag-dot::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Table ──────────────────────────────────────── */
    .table-card { padding: 0; overflow: hidden; }
    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-head-label { font-size: 11px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      padding: 10px 20px;
      text-align: left;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
    }
    tr:hover td { background: var(--bg-hover); }
    tbody tr:last-child td { border-bottom: none; }

    .user-cell { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .av-1 { background: #a78bfa; }
    .av-2 { background: #60a5fa; }
    .av-3 { background: #fbbf24; }
    .av-4 { background: #f87171; }
    .av-5 { background: #4ade80; }
    .av-6 { background: #f472b6; }

    .mono { font-family: var(--mono); }

    /* ── Animations ─────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.10s; }
    .d3 { animation-delay: 0.15s; }
    .d4 { animation-delay: 0.20s; }
    .d5 { animation-delay: 0.25s; }

    /* ── Chart ──────────────────────────────────────── */
    .chart-wrap { position: relative; height: 220px; margin-top: 8px; }

    /* ── KB forms ───────────────────────────────────── */
    .kb-flash {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      border: 1px solid;
      margin-bottom: 8px;
    }
    .kb-flash.success { border-color: var(--green-dim); background: var(--green-dim); color: var(--green); }
    .kb-flash.error   { border-color: var(--red-dim);   background: var(--red-dim);   color: var(--red); }

    .kb-grid { display: grid; gap: 20px; grid-template-columns: 300px 1fr; align-items: start; }

    .kb-form label {
      display: block;
      font-size: 10px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .kb-form input[type="text"],
    .kb-form input[type="file"] {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
    }
    .kb-form input[type="file"] { padding: 7px 10px; cursor: pointer; }
    .kb-form .field { margin-bottom: 14px; }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-danger {
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid var(--red-dim);
      background: var(--red-dim);
      color: var(--red);
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-danger:hover { background: var(--red-dim); }
    .kb-hint { font-size: 11px; color: var(--text-muted); margin-top: 10px; }
    td.kb-wrap { white-space: normal; max-width: 260px; word-break: break-word; }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { flex-direction: row; align-items: center; padding: 12px 16px; gap: 12px; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; }
      .brand { padding: 0; border: none; margin: 0; }
      .nav { flex-direction: row; }
      .sidebar-footer { display: none; }
      .content { padding: 20px 16px; }
      .kb-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">S</div>
        <div>
          <div class="brand-name">SAFIA</div>
          <div class="brand-sub">Control Panel</div>
        </div>
      </div>

      <nav class="nav">
        <a href="{{ url_for('admin.dashboard') }}" class="nav-link {% if active == 'dashboard' %}nav-link-active{% endif %}">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="1" width="5.5" height="5.5" rx="1"/>
            <rect x="9.5" y="1" width="5.5" height="5.5" rx="1"/>
            <rect x="1" y="9.5" width="5.5" height="5.5" rx="1"/>
            <rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1"/>
          </svg>
          Overview
        </a>
        <a href="{{ url_for('admin.users') }}" class="nav-link {% if active == 'users' %}nav-link-active{% endif %}">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.5 14v-1.5A3 3 0 0 0 7.5 9.5h-4A3 3 0 0 0 .5 12.5V14"/>
            <circle cx="5.5" cy="4" r="3"/>
            <path d="M14.5 14v-1.5a3 3 0 0 0-2-2.82"/>
            <path d="M10.5 1.18a3 3 0 0 1 0 5.64"/>
          </svg>
          Users
        </a>
        <a href="{{ url_for('admin.knowledge') }}" class="nav-link {% if active == 'knowledge' %}nav-link-active{% endif %}">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 13.5A2 2 0 0 1 4 11.5H14"/>
            <path d="M4 .5H14v15H4A2 2 0 0 1 2 13.5v-11A2 2 0 0 1 4 .5z"/>
            <path d="M5 4.5h7M5 7.5h7M5 10.5h3"/>
          </svg>
          Knowledge
        </a>
        <a href="{{ url_for('admin.settings') }}" class="nav-link {% if active == 'settings' %}nav-link-active{% endif %}">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/>
          </svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light theme">
          <svg class="icon-light" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="4"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
          </svg>
          <svg class="icon-dark" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 10.5A6 6 0 0 1 5.5 2.5 6 6 0 1 0 13.5 10.5z"/>
          </svg>
          <span class="theme-label">Light</span>
        </button>
        <div class="sidebar-footer-row">{{ env_label }}</div>
      </div>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    (function() {
      var saved = localStorage.getItem("safia-theme");
      var prefers = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (saved === "dark" || (!saved && prefers)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
      if (document.documentElement.getAttribute("data-theme") === "dark") {
        var label = document.querySelector(".theme-label");
        if (label) label.textContent = "Dark";
      }
    })();

    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.getAttribute("data-theme") === "dark";
      var next = isDark ? "light" : "dark";
      html.setAttribute("data-theme", isDark ? "" : "dark");
      localStorage.setItem("safia-theme", isDark ? "light" : "dark");
      var label = document.querySelector(".theme-label");
      if (label) label.textContent = isDark ? "Light" : "Dark";
    }
  </script>
</body>
</html>
