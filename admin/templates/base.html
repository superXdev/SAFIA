<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @property --border-angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }

    :root {
      --bg-root: #06060b;
      --bg-sidebar: #0a0a12;
      --bg-content: #09090f;
      --surface: rgba(255, 255, 255, 0.025);
      --surface-hover: rgba(255, 255, 255, 0.05);
      --surface-active: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --border-active: rgba(255, 255, 255, 0.18);
      --text-primary: #e8ecf4;
      --text-secondary: #7a839b;
      --text-tertiary: #454d63;
      --accent: #818cf8;
      --accent-glow: rgba(129, 140, 248, 0.25);
      --emerald: #34d399;
      --emerald-glow: rgba(52, 211, 153, 0.2);
      --amber: #fbbf24;
      --amber-glow: rgba(251, 191, 36, 0.2);
      --rose: #fb7185;
      --rose-glow: rgba(251, 113, 133, 0.2);
      --cyan: #22d3ee;
      --cyan-glow: rgba(34, 211, 238, 0.2);
      --font-sans: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --shadow-card: 0 0 0 1px var(--border), 0 8px 40px rgba(0, 0, 0, 0.35);
      --shadow-card-hover: 0 0 0 1px var(--border-hover), 0 16px 64px rgba(0, 0, 0, 0.5);
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-spring: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-root);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 30%, rgba(99, 102, 241, 0.07), transparent 70%),
        radial-gradient(ellipse 60% 50% at 85% 20%, rgba(168, 85, 247, 0.05), transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 90%, rgba(59, 130, 246, 0.04), transparent 60%);
      animation: mesh-drift 25s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes mesh-drift {
      0%   { opacity: 1; transform: scale(1) translate(0, 0); }
      50%  { opacity: 0.8; transform: scale(1.08) translate(-1.5%, 2%); }
      100% { opacity: 1; transform: scale(1) translate(1%, -1%); }
    }

    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.14); }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 272px minmax(0, 1fr);
      height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 20px;
      gap: 28px;
      overflow-y: auto;
      position: relative;
    }
    .sidebar::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(129, 140, 248, 0.15) 30%,
        rgba(168, 85, 247, 0.1) 60%,
        transparent 100%
      );
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 4px;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3), 0 0 40px rgba(168, 85, 247, 0.15);
      flex-shrink: 0;
    }
    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #e2e8f0 30%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-section {
      margin-top: 8px;
    }
    .nav-section:first-child { margin-top: 0; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-tertiary);
      padding: 0 12px;
      margin-bottom: 6px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 450;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      position: relative;
    }
    .nav-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.5;
      transition: opacity var(--transition-fast);
    }
    .nav-link .nav-badge {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      transition: color var(--transition-fast);
    }
    .nav-link:hover {
      color: var(--text-primary);
      background: var(--surface-hover);
    }
    .nav-link:hover svg { opacity: 0.8; }
    .nav-link-active {
      color: var(--text-primary);
      background: var(--surface-active);
    }
    .nav-link-active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 18px;
      border-radius: 0 3px 3px 0;
      background: linear-gradient(180deg, #818cf8, #a78bfa);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .nav-link-active svg { opacity: 1; color: var(--accent); }
    .nav-link-active .nav-badge { color: var(--text-secondary); }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .env-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(129, 140, 248, 0.1);
      color: var(--accent);
      border: 1px solid rgba(129, 140, 248, 0.15);
    }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .live-dot::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--emerald);
      box-shadow: 0 0 8px var(--emerald-glow), 0 0 16px var(--emerald-glow);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* ── Content area ────────────────────────────────────── */
    .content {
      padding: 32px 40px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .content-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      animation: fade-up 0.5s ease-out both;
    }
    .content-title-block h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .content-title-block p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }
    .chip:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }
    .timestamp {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }

    /* ── Cards ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      transition: all var(--transition-smooth);
      overflow: hidden;
      animation: fade-up 0.5s ease-out both;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--card-accent, linear-gradient(90deg, #818cf8, #a78bfa));
      opacity: 0.7;
      transition: opacity var(--transition-fast);
      pointer-events: none;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-lg);
      padding: 1px;
      background: conic-gradient(from var(--border-angle), transparent 60%, var(--accent) 80%, transparent 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity var(--transition-smooth);
      animation: border-spin 4s linear infinite;
      pointer-events: none;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
    }
    .card:hover::before { opacity: 1; }
    .card:hover::after { opacity: 0.5; }

    @keyframes border-spin {
      to { --border-angle: 360deg; }
    }

    .card-accent-indigo  { --card-accent: linear-gradient(90deg, #6366f1, #818cf8); }
    .card-accent-cyan    { --card-accent: linear-gradient(90deg, #06b6d4, #22d3ee); }
    .card-accent-amber   { --card-accent: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .card-accent-rose    { --card-accent: linear-gradient(90deg, #e11d48, #fb7185); }
    .card-accent-emerald { --card-accent: linear-gradient(90deg, #059669, #34d399); }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }
    .card-number {
      font-family: var(--font-mono);
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Tags / Badges ───────────────────────────────────── */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-mono);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: var(--surface);
    }
    .tag::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .tag-ok {
      color: var(--emerald);
      border-color: rgba(52, 211, 153, 0.2);
      background: rgba(52, 211, 153, 0.06);
    }
    .tag-ok::before { box-shadow: 0 0 6px var(--emerald-glow); }
    .tag-warn {
      color: var(--amber);
      border-color: rgba(251, 191, 36, 0.2);
      background: rgba(251, 191, 36, 0.06);
    }
    .tag-warn::before { box-shadow: 0 0 6px var(--amber-glow); }
    .tag-bad {
      color: var(--rose);
      border-color: rgba(251, 113, 133, 0.2);
      background: rgba(251, 113, 133, 0.06);
    }
    .tag-bad::before { box-shadow: 0 0 6px var(--rose-glow); }
    .tag-info {
      color: var(--cyan);
      border-color: rgba(34, 211, 238, 0.2);
      background: rgba(34, 211, 238, 0.06);
    }
    .tag-info::before { box-shadow: 0 0 6px var(--cyan-glow); }

    /* ── Table ────────────────────────────────────────────── */
    .table-card {
      padding: 0;
      overflow: hidden;
    }
    .table-card .card-head {
      padding: 18px 24px;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border);
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead { position: sticky; top: 0; z-index: 2; }
    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      background: rgba(255, 255, 255, 0.015);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      white-space: nowrap;
      color: var(--text-secondary);
    }
    tr { transition: background var(--transition-fast); }
    tbody tr:hover td { background: var(--surface-hover); }
    tbody tr:last-child td { border-bottom: none; }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .avatar-1 { background: linear-gradient(135deg, #6366f1, #818cf8); }
    .avatar-2 { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
    .avatar-3 { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .avatar-4 { background: linear-gradient(135deg, #e11d48, #fb7185); }
    .avatar-5 { background: linear-gradient(135deg, #059669, #34d399); }

    .user-info-name { color: var(--text-primary); font-weight: 500; }
    .user-info-handle {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    .mono { font-family: var(--font-mono); }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: 0.08s; }
    .delay-2 { animation-delay: 0.16s; }
    .delay-3 { animation-delay: 0.24s; }
    .delay-4 { animation-delay: 0.32s; }
    .delay-5 { animation-delay: 0.40s; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        gap: 16px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
      }
      .sidebar::after { display: none; }
      .nav { flex-direction: row; gap: 4px; }
      .nav-section-label { display: none; }
      .nav-link-active::before {
        left: 50%;
        top: auto;
        bottom: 0;
        transform: translateX(-50%);
        width: 18px;
        height: 3px;
        border-radius: 3px 3px 0 0;
      }
      .sidebar-footer { display: none; }
      .content { padding: 24px 16px; }
      .content-header { flex-direction: column; gap: 12px; }
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">&Sigma;</div>
        <div class="brand-text">
          <div class="brand-name">SAFIA</div>
          <div class="brand-sub">Admin Panel</div>
        </div>
      </div>

      <nav class="nav">
        <div class="nav-section">
          <div class="nav-section-label">Menu</div>
          <a href="{{ url_for('admin.dashboard') }}"
             class="nav-link {% if active == 'dashboard' %}nav-link-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1.5"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
            <span class="nav-badge">&#8599;</span>
          </a>
          <a href="{{ url_for('admin.users') }}"
             class="nav-link {% if active == 'users' %}nav-link-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Users
            <span class="nav-badge">&#8599;</span>
          </a>
          <a href="{{ url_for('admin.knowledge') }}"
             class="nav-link {% if active == 'knowledge' %}nav-link-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              <path d="M8 7h8M8 11h8M8 15h4"/>
            </svg>
            Knowledge
            <span class="nav-badge">&#8599;</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-row">
          <span>Environment</span>
          <span class="env-badge">{{ env_label }}</span>
        </div>
      </div>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
